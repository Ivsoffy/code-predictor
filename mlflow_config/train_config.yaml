seed: 42

model:
  pretrained_name: "sberbank-ai/ruT5-base"

paths:
  train_data: "data/train_v3/train.parquet"
  eval_data: "data/train_v3/test.parquet"
  codes: "function_model_weights/codes.json"
  output_base_dir: "models/ruT5"

mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "code-predictor"
  run_name: "ruT5-training"
  log_model_artifact: false

data:
  eval_size: 0.1
  input_max_length: 128
  target_max_length: 32
  train_columns:
    industry: "industry"
    job_title: "job_title"
    code: "code"
    departments:
      - "p1"
      - "p2"
      - "p3"
      - "p4"
      - "p5"
      - "p6"

training:
  eval_strategy: "steps"
  save_strategy: "steps"
  eval_steps: 200
  save_steps: 200
  logging_steps: 100
  save_total_limit: 3
  learning_rate: 0.0001
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06
  weight_decay: 0.01
  max_grad_norm: 1.0
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 8
  num_train_epochs: 10
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  optim: "adamw_torch"
  fp16: "auto"
  predict_with_generate: true
  generation_max_length: 32
  generation_num_beams: 3
  label_smoothing_factor: 0.1

early_stopping:
  enabled: true
  patience: 3

evaluation:
  f1_average: "macro"
